<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>YouTube Inspector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h3>YouTube Algorithm Inspector</h3>
    <div id="report" class="report">Generating report…</div>
    <div class="buttons">
      <button id="refreshBtn">Refresh report</button>
      <button id="exportBtn">Export JSON</button>
      <button id="clearBtn">Delete all data</button>
    </div>
    <small class="note">All data stored locally. Use Export to save a copy.</small>
  </div>
  <script src="popup.js"></script>
</body>
</html>
